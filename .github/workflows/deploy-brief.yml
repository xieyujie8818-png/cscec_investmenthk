name: Deploy leadership brief to GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-brief.yml"
  workflow_dispatch:
    inputs:
      rebuild_from_mvp:
        description: "Rebuild flat HTML from news-intelligence-mvp/output (legacy MVP track)"
        type: boolean
        default: false
      output_dir:
        description: "Output folder under news-intelligence-mvp/output (e.g. 2026-06-13_2026-06-15)"
        required: false
        default: "2026-06-13_2026-06-15"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild_from_mvp }}
        with:
          python-version: "3.12"

      - name: Optional MVP rebuild
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild_from_mvp }}
        run: |
          OUT="${{ github.event.inputs.output_dir || '2026-06-13_2026-06-15' }}"
          python news-intelligence-mvp/scripts/build_leadership_brief.py \
            "news-intelligence-mvp/output/${OUT}"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
